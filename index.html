<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌟 Habit Tracker</h1>
      <div class="controls">
        <select id="filterSelect">
          <option value="all">All Habits</option>
          <option value="active">Active</option>
          <option value="completed">Completed Today</option>
        </select>
        <button id="darkModeToggle">🌙 Dark Mode</button>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
    </header>

    <div class="stats-section">
      <div class="stat-card">
        <h3>Today's Progress</h3>
        <div class="progress-circle">
          <div class="progress-text" id="todayProgress">0%</div>
        </div>
      </div>
      <div class="stat-card">
        <h3>Current Streaks</h3>
        <div class="streak-info" id="streakInfo">0 active streaks</div>
      </div>
      <div class="stat-card">
        <h3>Total Habits</h3>
        <div class="total-habits" id="totalHabits">0</div>
      </div>
    </div>

    <div class="input-section">
      <input type="text" id="habitInput" placeholder="Enter a new habit">
      <select id="categorySelect">
        <option value="health">🏃 Health</option>
        <option value="learning">📚 Learning</option>
        <option value="productivity">⚡ Productivity</option>
        <option value="mindfulness">🧘 Mindfulness</option>
        <option value="social">👥 Social</option>
        <option value="other">✨ Other</option>
      </select>
      <button id="addBtn">Add Habit</button>
      <button id="aiSuggestBtn" class="ai-suggest-btn" title="Get AI-powered habit suggestions">🤖 AI Suggest</button>
    </div>

    <div class="weekly-view">
      <h3>This Week</h3>
      <div class="week-days" id="weekDays"></div>
    </div>

    <ul id="habitList"></ul>

    <div class="motivation-section">
      <div class="motivation-quote" id="motivationQuote">
        "The journey of a thousand miles begins with a single step." - Lao Tzu
      </div>
    </div>
  </div>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
